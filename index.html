    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {

                        charcoal: '#050505',

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        
        h1, h2, h3, .font-serif {
            font-family: 'Playfair Display', serif;
        }

        /* Glowing Beams Background */
        .glowing-beams {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: #050505;
        }

        .beam {
            position: absolute;
            width: 2px;
            height: 100vh;
            background: linear-gradient(to bottom, rgba(212, 175, 55, 0), rgba(212, 175, 55, 0.5), rgba(212, 175, 55, 0));
            opacity: 0;
            animation: beam-fall 8s infinite linear;
        }

        .beam:nth-child(1) { left: 10%; animation-delay: 0s; }
        .beam:nth-child(2) { left: 30%; animation-delay: 2s; }
        .beam:nth-child(3) { left: 50%; animation-delay: 4s; }
        .beam:nth-child(4) { left: 70%; animation-delay: 1s; }
        .beam:nth-child(5) { left: 90%; animation-delay: 3s; }

        @keyframes beam-fall {
            0% { transform: translateY(-100%); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(100%); opacity: 0; }
        }

        /* 3D Hover Effect for Bento Grid */
        .bento-card {
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .bento-card:hover {
            transform: translateY(-10px) scale(1.02) rotateX(2deg) rotateY(-2deg);
            box-shadow: 0 20px 40px rgba(212, 175, 55, 0.15);
            border-color: rgba(212, 175, 55, 0.5);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .gold-gradient-text {
            background: linear-gradient(to right, #D4AF37, #F3E5AB, #D4AF37);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            background-size: 200% auto;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            to {
                background-position: 200% center;
            }
        }
    </style>
</head>
